services:
  # ─── Serviceheft App ─────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3001"
      - "${UDP_PORT:-41234}:41234/udp"
    volumes:
      - ./uploads:/app/server/uploads
      - ./data:/app/server/data
      - ./config.json:/app/config.json
    environment:
      NODE_ENV: production

