services:
  # ─── Serviceheft App ─────────────────────────────
  serviceheft-webserver:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3001"
      - "${UDP_PORT:-41234}:41234/udp"
    volumes:
      - ./uploads:/app/server/uploads
      - ./data:/app/server/data
      - ./config.json:/app/config.json
    environment:
      NODE_ENV: production
      PUID: ${UID:-1000}
      PGID: ${GID:-1000}
    # Run as root initially so the entrypoint can fix permissions,
    # then it drops to the target UID/GID via su-exec.
    init: true
